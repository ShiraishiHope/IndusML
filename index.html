<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BonneEcoute - Analyse de Test Tonal</title>
    <!-- Framework CSS Tailwind pour un design moderne et responsive -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js pour la visualisation de l'audiogramme -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(8px); }
        /* Style pour les éléments cliquables de l'historique */
        .history-item { cursor: pointer; transition: all 0.2s; border-left: 4px solid transparent; }
        .history-item:hover { border-left-color: #3b82f6; background-color: #f1f5f9; transform: translateX(2px); }
        /* Scrollbar fine pour la liste de l'historique */
        #history-list::-webkit-scrollbar { width: 4px; }
        #history-list::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- En-tête de l'application -->
    <header class="bg-blue-900 text-white p-4 shadow-md flex justify-between items-center px-8">
        <div class="flex items-center gap-3">
            <svg class="w-8 h-8 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3"></path>
            </svg>
            <h1 class="text-xl font-black tracking-tighter uppercase">BONNE<span class="text-blue-400">ECOUTE</span></h1>
        </div>
        <div id="api-status-badge" class="text-[10px] font-bold px-3 py-1 rounded-full bg-slate-800 border border-slate-700 uppercase tracking-widest text-yellow-500">
            API: Vérification...
        </div>
    </header>

    <main class="flex-grow grid lg:grid-cols-12 gap-6 p-6 max-w-7xl mx-auto w-full">
        
        <!-- Colonne Gauche : Formulaire & Historique -->
        <div class="lg:col-span-5 space-y-6">
            
            <!-- Section Saisie des Données -->
            <section class="glass rounded-3xl shadow-sm border border-slate-200 p-8">
                <h2 class="text-lg font-bold text-slate-800 mb-6 flex items-center gap-2">
                    <span class="p-2 bg-blue-100 text-blue-600 rounded-lg">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                    </span>
                    Mesures Audiométriques
                </h2>

                <div class="space-y-4">
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase">Identifiant de l'Appareil</label>
                        <input type="text" id="appareil_id" placeholder="Ex: UNIT-001" class="w-full mt-1 px-4 py-2 border rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                    </div>

                    <div class="grid grid-cols-4 gap-3">
                        <div class="col-span-1">
                            <label class="text-[10px] font-bold text-slate-400 uppercase">125 Hz</label>
                            <input type="text" id="f125" placeholder="dB" class="w-full mt-1 p-2 border rounded-lg text-center font-bold focus:border-blue-500 outline-none">
                        </div>
                        <div class="col-span-1">
                            <label class="text-[10px] font-bold text-slate-400 uppercase">250 Hz</label>
                            <input type="text" id="f250" placeholder="dB" class="w-full mt-1 p-2 border rounded-lg text-center font-bold focus:border-blue-500 outline-none">
                        </div>
                        <div class="col-span-1">
                            <label class="text-[10px] font-bold text-slate-400 uppercase">500 Hz</label>
                            <input type="text" id="f500" placeholder="dB" class="w-full mt-1 p-2 border rounded-lg text-center font-bold focus:border-blue-500 outline-none">
                        </div>
                        <div class="col-span-1">
                            <label class="text-[10px] font-bold text-slate-400 uppercase">1k Hz</label>
                            <input type="text" id="f1k" placeholder="dB" class="w-full mt-1 p-2 border rounded-lg text-center font-bold focus:border-blue-500 outline-none">
                        </div>
                        <div class="col-span-1">
                            <label class="text-[10px] font-bold text-slate-400 uppercase">2k Hz</label>
                            <input type="text" id="f2k" placeholder="dB" class="w-full mt-1 p-2 border rounded-lg text-center font-bold focus:border-blue-500 outline-none">
                        </div>
                        <div class="col-span-1">
                            <label class="text-[10px] font-bold text-slate-400 uppercase">4k Hz</label>
                            <input type="text" id="f4k" placeholder="dB" class="w-full mt-1 p-2 border rounded-lg text-center font-bold focus:border-blue-500 outline-none">
                        </div>
                        <div class="col-span-1">
                            <label class="text-[10px] font-bold text-slate-400 uppercase">8k Hz</label>
                            <input type="text" id="f8k" placeholder="dB" class="w-full mt-1 p-2 border rounded-lg text-center font-bold focus:border-blue-500 outline-none">
                        </div>
                    </div>

                    <button id="predict-btn" class="w-full py-4 bg-blue-600 text-white font-bold rounded-2xl shadow-lg hover:bg-blue-700 transition-all flex justify-center items-center gap-2 active:scale-95">
                        <span>Lancer l'Analyse Prédictive</span>
                        <div id="loader" class="hidden w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
                    </button>
                </div>
            </section>

            <!-- Section Journal (Historique) -->
            <section class="glass rounded-3xl shadow-sm border border-slate-200 p-6">
                <h3 class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-4 flex justify-between items-center">
                    Journal des sessions
                    <button onclick="fetchHistory()" class="text-blue-500 text-[10px] hover:underline font-black">ACTUALISER</button>
                </h3>
                <div id="history-list" class="space-y-2 max-h-60 overflow-y-auto pr-2">
                    <p class="text-[10px] text-slate-400 text-center py-4 italic">Aucun test archivé.</p>
                </div>
            </section>
        </div>

        <!-- Colonne Droite : Audiogramme -->
        <div class="lg:col-span-7">
            <div class="glass rounded-3xl shadow-sm border border-slate-200 p-8 h-full flex flex-col">
                <h2 class="text-lg font-bold text-slate-800 mb-6 flex items-center gap-2">
                    <span class="p-2 bg-emerald-100 text-emerald-600 rounded-lg">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 8v8m-4-5v5m-4-2v2m-2 4h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                    </span>
                    Simulation de Correction Auditive
                </h2>
                
                <div id="chart-placeholder" class="flex-grow flex flex-col items-center justify-center bg-slate-50 border-2 border-dashed border-slate-200 rounded-3xl text-slate-400 p-10 text-center">
                    <svg class="w-12 h-12 mb-3 opacity-20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                    <p class="text-sm italic">Entrez des mesures et lancez l'analyse pour visualiser l'audiogramme comparatif.</p>
                </div>
                
                <div id="chart-container" class="hidden flex-grow relative min-h-[450px] w-full">
                    <canvas id="audiogram"></canvas>
                </div>

                <div class="mt-6 flex justify-between items-center bg-slate-100 p-4 rounded-2xl border border-slate-200">
                    <div class="flex flex-col">
                        <span class="text-[10px] font-bold text-slate-500 uppercase tracking-tight">Moteur d'inférence</span>
                        <span class="text-xs font-black text-slate-700">Version 1.0</span>
                    </div>
                    <button id="train-btn" class="text-[10px] font-black uppercase bg-slate-800 text-white px-5 py-2.5 rounded-xl hover:bg-black transition-all active:scale-95 shadow-md">Re-entraîner</button>
                </div>
            </div>
        </div>

    </main>

    <script>
        const API = "http://127.0.0.1:5000";
        let chart = null;

        // 1. Vérification du statut de l'API et chargement de l'historique initial
        async function checkStatus() {
            const badge = document.getElementById('api-status-badge');
            try {
                const res = await fetch(API + "/");
                if(res.ok) {
                    badge.innerText = "API: Connecté";
                    badge.classList.replace('text-yellow-500', 'text-emerald-500');
                    fetchHistory();
                }
            } catch(e) {
                badge.innerText = "API: Déconnecté";
                badge.classList.replace('text-yellow-500', 'text-rose-500');
            }
        }

        // 2. Récupérer l'historique depuis la route /history de app.py
        async function fetchHistory() {
            const list = document.getElementById('history-list');
            try {
                const res = await fetch(API + "/history");
                const data = await res.json();
                list.innerHTML = "";
                
                if(!data || data.length === 0) {
                    list.innerHTML = '<p class="text-[10px] text-slate-400 text-center py-4 italic">Aucun test archivé.</p>';
                    return;
                }

                // Affichage du plus récent en haut
                data.reverse().forEach(entry => {
                    const item = document.createElement('div');
                    item.className = "history-item p-3 bg-white border border-slate-100 rounded-xl flex justify-between items-center shadow-sm";
                    
                    // Au clic, on appelle la fonction de restauration
                    item.onclick = () => loadHistoryEntry(entry);
                    
                    item.innerHTML = `
                        <div class="flex flex-col">
                            <span class="text-[9px] font-black text-blue-500 uppercase tracking-tighter">ID Appareil</span>
                            <span class="text-xs font-bold text-slate-700">${entry.appareil_id || 'N/A'}</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <span class="text-[8px] bg-blue-50 text-blue-600 px-2 py-1 rounded-md font-bold uppercase tracking-wider">Restaurer</span>
                        </div>
                    `;
                    list.appendChild(item);
                });
            } catch(e) { console.error("Erreur lors du chargement de l'historique:", e); }
        }

        // 3. Restaurer une entrée du journal dans le formulaire
        function loadHistoryEntry(e) {
            document.getElementById('appareil_id').value = e.appareil_id || "";
            document.getElementById('f125').value = e.before_exam_125_Hz || "";
            document.getElementById('f250').value = e.before_exam_250_Hz || "";
            document.getElementById('f500').value = e.before_exam_500_Hz || "";
            document.getElementById('f1k').value = e.before_exam_1000_Hz || "";
            document.getElementById('f2k').value = e.before_exam_2000_Hz || "";
            document.getElementById('f4k').value = e.before_exam_4000_Hz || "";
            document.getElementById('f8k').value = e.before_exam_8000_Hz || "";
            
            // Notification visuelle rapide sur le bouton
            const btn = document.getElementById('predict-btn');
            const originalText = btn.innerHTML;
            btn.innerHTML = "Données chargées !";
            btn.classList.replace('bg-blue-600', 'bg-emerald-500');
            setTimeout(() => {
                btn.innerHTML = originalText;
                btn.classList.replace('bg-emerald-500', 'bg-blue-600');
            }, 1000);
        }

        // 4. Lancer l'analyse (Predict)
        document.getElementById('predict-btn').onclick = async () => {
            const id = document.getElementById('appareil_id').value;
            if(!id) return alert("Veuillez saisir un Identifiant d'Appareil.");

            const parseVal = (id) => {
                let v = document.getElementById(id).value.replace(',', '.');
                return v === "" ? NaN : parseFloat(v);
            };

            const payload = {
                appareil_id: id,
                before_exam_125_Hz: parseVal('f125'),
                before_exam_250_Hz: parseVal('f250'),
                before_exam_500_Hz: parseVal('f500'),
                before_exam_1000_Hz: parseVal('f1k'),
                before_exam_2000_Hz: parseVal('f2k'),
                before_exam_4000_Hz: parseVal('f4k'),
                before_exam_8000_Hz: parseVal('f8k'),
                source: "user_interface_api"
            };

            // Vérification des champs vides
            if (Object.values(payload).some(val => typeof val === 'number' && isNaN(val))) {
                return alert("Veuillez remplir toutes les fréquences avec des nombres.");
            }

            const loader = document.getElementById('loader');
            loader.classList.remove('hidden');

            try {
                const res = await fetch(API + "/predict", {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });
                
                if(!res.ok) throw new Error("Erreur serveur");

                const result = await res.json();
                const prediction = Array.isArray(result) ? result[0] : result;

                // Affichage du graphique
                renderAudiogram(payload, prediction);
                // Mise à jour du journal
                fetchHistory();
            } catch(e) {
                alert("Erreur lors de la communication avec l'API Flask.");
            } finally {
                loader.classList.add('hidden');
            }
        };

        // 5. Rendu du graphique comparatif (Norme Audiogramme : 0dB en haut)
        function renderAudiogram(before, after) {
            document.getElementById('chart-placeholder').classList.add('hidden');
            document.getElementById('chart-container').classList.remove('hidden');

            const labels = ['125 Hz', '250 Hz', '500 Hz', '1000 Hz', '2000 Hz', '4000 Hz', '8000 Hz'];
            const dataBefore = [before.before_exam_125_Hz, before.before_exam_250_Hz, before.before_exam_500_Hz, before.before_exam_1000_Hz, before.before_exam_2000_Hz, before.before_exam_4000_Hz, before.before_exam_8000_Hz];
            const dataAfter = [after.after_exam_125_Hz, after.after_exam_250_Hz, after.after_exam_500_Hz, after.after_exam_1000_Hz, after.after_exam_2000_Hz, after.after_exam_4000_Hz, after.after_exam_8000_Hz];

            if(chart) chart.destroy();

            const ctx = document.getElementById('audiogram').getContext('2d');
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        { 
                            label: 'Avec Appareil (Simulation)', 
                            data: dataAfter, 
                            borderColor: '#10b981', 
                            backgroundColor: 'rgba(16, 185, 129, 0.1)', 
                            tension: 0.3, 
                            fill: true, 
                            pointRadius: 6,
                            pointHoverRadius: 8,
                            borderWidth: 3
                        },
                        { 
                            label: 'Sans Appareil (Perte initiale)', 
                            data: dataBefore, 
                            borderColor: '#3b82f6', 
                            backgroundColor: 'rgba(59, 130, 246, 0.1)', 
                            tension: 0.3, 
                            fill: true, 
                            pointRadius: 6,
                            pointHoverRadius: 8,
                            borderWidth: 3
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { 
                            reverse: true, // IMPORTANT : 0dB en haut pour l'audiogramme
                            min: -10, 
                            max: 120, 
                            title: { display: true, text: 'Perte Auditive (dB HL)', font: { size: 12, weight: 'bold' } },
                            grid: { color: '#e2e8f0' }
                        },
                        x: { 
                            title: { display: true, text: 'Fréquence (Hz)', font: { size: 12, weight: 'bold' } },
                            grid: { display: false }
                        }
                    },
                    plugins: { 
                        legend: { position: 'top', labels: { font: { size: 12, weight: 'bold' }, usePointStyle: true } },
                        tooltip: { backgroundColor: 'rgba(15, 23, 42, 0.9)', padding: 12 }
                    }
                }
            });
        }

        // 6. Ré-entraînement du modèle
        document.getElementById('train-btn').onclick = async () => {
            if(!confirm("Lancer le ré-entraînement global du modèle Kedro ?")) return;
            const btn = document.getElementById('train-btn');
            btn.innerText = "ENTRAÎNEMENT...";
            btn.disabled = true;
            try {
                const res = await fetch(API + "/train", { method: 'POST' });
                const data = await res.json();
                alert(data.message);
            } catch(e) {
                alert("Erreur lors de l'entraînement.");
            } finally {
                btn.innerText = "RE-ENTRAÎNER";
                btn.disabled = false;
            }
        };

        // Lancement au démarrage
        checkStatus();
    </script>
</body>
</html>
