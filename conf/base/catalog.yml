# Raw data
raw_audiograms:
  type: pandas.CSVDataset
  filepath: data/01_raw/tonal_exams.csv

raw_vocal_data:
  type: pandas.CSVDataset
  filepath: vocal_dataset.csv
  load_args:
    sep: ","

# Cleaned data
cleaned_audiograms:
  type: pandas.CSVDataset
  filepath: data/02_intermediate/cleaned_audiograms.csv

cleaned_vocal_data:
  type: pandas.CSVDataset
  filepath: data/02_intermediate/cleaned_vocal_data.csv

# Train/Test split
X_train:
  type: pandas.CSVDataset
  filepath: data/05_model_input/X_train.csv

X_test:
  type: pandas.CSVDataset
  filepath: data/05_model_input/X_test.csv

y_train:
  type: pandas.CSVDataset
  filepath: data/05_model_input/y_train.csv

y_test:
  type: pandas.CSVDataset
  filepath: data/05_model_input/y_test.csv

# TensorFlow Model
trained_model:
  type: tensorflow.TensorFlowModelDataset
  filepath: data/06_models/audiogram_model.keras
  load_args:
    compile: false

# Metrics
model_metrics:
  type: json.JSONDataset
  filepath: data/08_reporting/metrics.json

# Validation report
validation_report:
  type: json.JSONDataset
  filepath: data/08_reporting/validation_report.json

# Inference datasets
inference_input:
  type: pandas.CSVDataset
  filepath: data/01_raw/inference_input.csv

validated_input:
  type: pandas.CSVDataset
  filepath: data/02_intermediate/validated_input.csv

validation_errors:
  type: json.JSONDataset
  filepath: data/08_reporting/validation_errors.json

predictions:
  type: pandas.CSVDataset
  filepath: data/07_model_output/predictions.csv

# Intermediate features/targets
features:
  type: pandas.CSVDataset
  filepath: data/03_primary/features.csv

targets:
  type: pandas.CSVDataset
  filepath: data/03_primary/targets.csv

best_hyperparameters:
  type: json.JSONDataset
  filepath: data/06_models/best_hyperparameters.json

  # Tenseurs pour le CNN (Sauvegardés en format Pickle)
X_train_vocal:
  type: pickle.PickleDataset
  filepath: data/05_model_input/X_train.pkl

X_test_vocal:
  type: pickle.PickleDataset
  filepath: data/05_model_input/X_test.pkl

y_train_vocal:
  type: pickle.PickleDataset
  filepath: data/05_model_input/y_train.pkl

y_test_vocal:
  type: pickle.PickleDataset
  filepath: data/05_model_input/y_test.pkl

X_vocal_full:
  type: pickle.PickleDataset
  filepath: data/05_model_input/X_vocal_full.pkl

y_vocal_full:
  type: pickle.PickleDataset
  filepath: data/05_model_input/y_vocal_full.pkl
# Modèle TensorFlow
vocal_model:
  type: tensorflow.TensorFlowModelDataset
  filepath: data/06_models/vocal_model.keras
  save_args:
    save_format: keras